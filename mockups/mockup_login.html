<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Pagely — 로그인/회원가입 목업</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:sans-serif}
body{background:#F8F7FF;color:#26215C}
.ann{background:#26215C;color:#fff;text-align:center;padding:8px;font-size:12px}
.nav{background:#fff;border-bottom:1px solid #e5e7eb;padding:12px 24px;display:flex;align-items:center;gap:12px}
.logo-txt{font-size:18px;font-weight:700;color:#26215C;letter-spacing:.1em}
.search-wrap{flex:1;display:flex;margin:0 16px}
.search-wrap input{flex:1;padding:8px 14px;border:1.5px solid #e5e7eb;border-right:none;border-radius:6px 0 0 6px;font-size:13px}
.search-wrap button{background:#534AB7;color:#fff;border:none;padding:8px 14px;border-radius:0 6px 6px 0;cursor:pointer}
.nav-right{display:flex;gap:10px;align-items:center}
.nav-link{font-size:13px;color:#534AB7;text-decoration:none}
.btn-reg{background:#534AB7;color:#fff;border:none;border-radius:6px;padding:7px 16px;font-size:13px;cursor:pointer}
.body-wrap{padding:36px 24px;display:flex;gap:28px;justify-content:center;flex-wrap:wrap}
.card{background:#fff;border:1px solid #e5e7eb;border-radius:14px;overflow:hidden;width:320px;flex-shrink:0}
.tabs{display:flex;border-bottom:2px solid #e5e7eb}
.tab{flex:1;padding:14px;text-align:center;font-size:13px;font-weight:600;color:#888;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
.tab.on{color:#534AB7;border-bottom-color:#534AB7}
.form-wrap{padding:22px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px}
.form-group input{width:100%;padding:10px 13px;border:1px solid #d1d5db;border-radius:6px;font-size:13px;color:#374151}
.form-group input:focus{outline:none;border-color:#534AB7}
.btn-main{width:100%;padding:12px;background:#534AB7;color:#fff;border:none;border-radius:7px;font-size:13px;font-weight:600;margin-top:2px;cursor:pointer}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0}
.divider hr{flex:1;border:none;border-top:1px solid #e5e7eb}
.divider span{font-size:11px;color:#888;white-space:nowrap}
.social-btns{display:flex;flex-direction:column;gap:8px}
.social-btn{display:flex;align-items:center;justify-content:center;gap:10px;padding:10px;border:1px solid #e5e7eb;border-radius:7px;font-size:12px;cursor:pointer;color:#374151;background:#fff}
.dot{width:16px;height:16px;border-radius:50%;flex-shrink:0}
.kakao{background:#FEE500}
.naver{background:#03C75A}
.google{background:#EA4335}
.links{display:flex;justify-content:center;gap:16px;margin-top:16px}
.links a{font-size:11px;color:#7F77DD;text-decoration:none;cursor:pointer}
.agree-box{background:#F8F7FF;border-radius:7px;padding:12px;margin-bottom:14px}
.ai{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.ai:last-child{margin-bottom:0}
.ai input{accent-color:#534AB7}
.ai label{font-size:11px;color:#374151;flex:1}
.ai span{font-size:10px;color:#7F77DD;cursor:pointer}
.row2{display:flex;gap:10px}
.row2 .form-group{flex:1}
.card-label{text-align:center;padding:14px 0 4px;font-size:11px;color:#888;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.footer{background:#26215C;padding:24px;display:flex;justify-content:space-between;align-items:center;margin-top:8px}
.ft-logo{font-size:15px;font-weight:700;color:#fff}
.ft-links{display:flex;gap:16px}
.ft-links span{font-size:11px;color:rgba(255,255,255,.4)}
</style>
</head>
<body>

<div class="ann">🎉 신규 가입 시 첫 달 무료 · 전자책 30만 권 보유</div>
<div class="nav">
  <div class="logo-txt">📖 Pagely</div>
  <div class="search-wrap"><input placeholder="읽고 싶은 책을 검색해보세요"/><button>검색</button></div>
  <div class="nav-right">
    <a class="nav-link" href="#">👤 로그인</a>
    <button class="btn-reg">회원가입</button>
    <a class="nav-link" href="#">🛍 장바구니</a>
  </div>
</div>

<div class="body-wrap">

  <!-- 로그인 카드 -->
  <div>
    <p class="card-label">로그인</p>
    <div class="card">
      <div class="tabs">
        <div class="tab on">로그인</div>
        <div class="tab">회원가입</div>
      </div>
      <div class="form-wrap">
        <div class="form-group"><label>이메일</label><input type="email" placeholder="이메일 주소를 입력하세요"/></div>
        <div class="form-group"><label>비밀번호</label><input type="password" placeholder="비밀번호를 입력하세요"/></div>
        <button class="btn-main">로그인</button>
        <div class="divider"><hr/><span>또는 소셜 로그인</span><hr/></div>
        <div class="social-btns">
          <div class="social-btn"><div class="dot kakao"></div>카카오로 시작하기</div>
          <div class="social-btn"><div class="dot naver"></div>네이버로 시작하기</div>
          <div class="social-btn"><div class="dot google"></div>Google로 시작하기</div>
        </div>
        <div class="links">
          <a>아이디 찾기</a><a>비밀번호 찾기</a><a>회원가입</a>
        </div>
      </div>
    </div>
  </div>

  <!-- 회원가입 카드 -->
  <div>
    <p class="card-label">회원가입</p>
    <div class="card">
      <div class="tabs">
        <div class="tab">로그인</div>
        <div class="tab on">회원가입</div>
      </div>
      <div class="form-wrap">
        <div class="row2">
          <div class="form-group"><label>이름</label><input type="text" placeholder="이름"/></div>
          <div class="form-group"><label>닉네임</label><input type="text" placeholder="닉네임"/></div>
        </div>
        <div class="form-group"><label>이메일</label><input type="email" placeholder="이메일 주소를 입력하세요"/></div>
        <div class="form-group"><label>비밀번호</label><input type="password" placeholder="8자 이상 입력하세요"/></div>
        <div class="form-group"><label>비밀번호 확인</label><input type="password" placeholder="비밀번호를 한번 더 입력하세요"/></div>
        <div class="agree-box">
          <div class="ai"><input type="checkbox"/><label><strong>전체 동의</strong></label></div>
          <div class="ai"><input type="checkbox"/><label>이용약관 동의 (필수)</label><span>보기</span></div>
          <div class="ai"><input type="checkbox"/><label>개인정보 처리방침 동의 (필수)</label><span>보기</span></div>
          <div class="ai"><input type="checkbox"/><label>마케팅 정보 수신 동의 (선택)</label><span>보기</span></div>
        </div>
        <button class="btn-main">회원가입</button>
      </div>
    </div>
  </div>

</div>

<div class="footer">
  <span class="ft-logo">📖 Pagely</span>
  <div class="ft-links">
    <span>이용약관</span><span>개인정보처리방침</span><span>청소년보호정책</span><span>© 2025 Pagely</span>
  </div>
</div>

</body>
</html>
