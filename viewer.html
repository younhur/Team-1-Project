<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>부의 추월차선 — 뷰어 · Pagely</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="viewer.css" />
  </head>
  <body class="viewer-body" id="viewerBody" style="font-family:'Pretendard',sans-serif">

    <!-- 상단 바 -->
    <header class="viewer-topbar">
      <a href="detail.html" class="viewer-back">
        <i class="bi bi-chevron-left"></i> 돌아가기
      </a>
      <div class="viewer-book-info">
        <span class="viewer-book-title">부의 추월차선</span>
        <span class="viewer-book-author">엠제이 드마코</span>
      </div>
      <div class="viewer-controls">
        <button id="fontDown" type="button" title="글자 작게"><i class="bi bi-dash-lg"></i></button>
        <button id="fontUp" type="button" title="글자 크게"><i class="bi bi-plus-lg"></i></button>
        <button id="themeToggle" type="button" title="배경 전환"><i class="bi bi-moon-stars"></i></button>
      </div>
    </header>

    <!-- 진행률 -->
    <div class="viewer-progress"><div class="viewer-progress-bar" id="progressBar"></div></div>

    <!-- 본문 -->
    <main class="viewer-stage">
      <button class="viewer-nav prev" id="prevPage" type="button" title="이전 쪽">
        <i class="bi bi-chevron-left"></i>
      </button>
      <article class="viewer-page" id="viewerPage"></article>
      <button class="viewer-nav next" id="nextPage" type="button" title="다음 쪽">
        <i class="bi bi-chevron-right"></i>
      </button>
    </main>

    <!-- 하단 -->
    <footer class="viewer-bottombar">
      <span id="pageIndicator">1 / 1</span>
    </footer>

    <script src="viewer.js"></script>
  </body>
</html>
